# Data Platform Configuration

database:
  type: postgres
  host: ${DB_HOST:-localhost}
  port: ${DB_PORT:-5432}
  name: ${DB_NAME:-datawarehouse}
  user: ${DB_USER:-postgres}
  password: ${DB_PASSWORD:-postgres}

storage:
  base_path: data-platform
  lake_path: data-platform/lake
  zones:
    raw: data-platform/lake/raw
    bronze: data-platform/lake/bronze
    silver: data-platform/lake/silver
    gold: data-platform/lake/gold

sources:
  - name: superstore
    type: csv
    file: superstore.csv
    enabled: true
    schema:
      order_id: string
      order_date: date
      ship_date: date
      ship_mode: string
      customer_id: string
      customer_name: string
      segment: string
      country: string
      city: string
      state: string
      postal_code: string
      region: string
      product_id: string
      category: string
      sub_category: string
      product_name: string
      sales: float
      quantity: integer
      discount: float
      profit: float

pipeline:
  schedule: "0 6 * * *"
  retry: 3
  retry_delay_minutes: 5
  batch_size: 1000

api:
  host: 0.0.0.0
  port: 8000
  title: Data Platform API
  version: 1.0.0

dashboard:
  host: 0.0.0.0
  port: 8888

logging:
  level: INFO
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"
  file: logs/pipeline.log

data_quality:
  check_nulls: true
  check_duplicates: true
  check_schema: true
  fail_on_error: false